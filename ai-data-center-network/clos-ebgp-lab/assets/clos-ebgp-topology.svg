<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 790" role="img" aria-labelledby="title desc">
  <title id="title">Containerlab topology graph for the Clos eBGP lab</title>
  <desc id="desc">Two spine routers connect to four leaf routers, and each leaf connects to one host.</desc>
  <style>
    .bg { fill: #fff; }
    .link { stroke: #cfe5ff; stroke-width: 2; fill: none; }
    .node { fill: #0089d6; }
    .tag { fill: #0089d6; }
    .node-label { fill: #0073c7; font: 13px sans-serif; }
    .ip-label { fill: #334155; font: 11px sans-serif; }
    .ip-label-center { fill: #334155; font: 11px sans-serif; text-anchor: middle; }
    .link-label { fill: #475569; font: 11px sans-serif; text-anchor: middle; }
    .tag-label { fill: #fff; font: 12px sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .router-label { fill: #fff; font: bold 16px sans-serif; text-anchor: middle; dominant-baseline: middle; }
  </style>

  <rect class="bg" width="1060" height="790"/>

  <!-- Fabric links -->
  <path class="link" d="M270 90 L120 430"/>
  <path class="link" d="M270 90 L390 430"/>
  <path class="link" d="M270 90 L670 430"/>
  <path class="link" d="M270 90 L930 430"/>
  <path class="link" d="M790 90 L120 430"/>
  <path class="link" d="M790 90 L390 430"/>
  <path class="link" d="M790 90 L670 430"/>
  <path class="link" d="M790 90 L930 430"/>

  <!-- Host links -->
  <path class="link" d="M120 455 L120 665"/>
  <path class="link" d="M390 455 L390 665"/>
  <path class="link" d="M670 455 L670 665"/>
  <path class="link" d="M930 455 L930 665"/>

  <!-- IP labels -->
  <text class="link-label" x="156" y="238" transform="rotate(-66 156 238)">10.1.1.0/31</text>
  <text class="link-label" x="318" y="238" transform="rotate(70 318 238)">10.2.1.0/31</text>
  <text class="link-label" x="470" y="244" transform="rotate(42 470 244)">10.3.1.0/31</text>
  <text class="link-label" x="615" y="238" transform="rotate(33 615 238)">10.4.1.0/31</text>
  <text class="link-label" x="306" y="270" transform="rotate(-34 306 270)">10.1.2.0/31</text>
  <text class="link-label" x="542" y="270" transform="rotate(-42 542 270)">10.2.2.0/31</text>
  <text class="link-label" x="725" y="238" transform="rotate(-70 725 238)">10.3.2.0/31</text>
  <text class="link-label" x="868" y="238" transform="rotate(66 868 238)">10.4.2.0/31</text>

  <text class="ip-label-center" x="120" y="575">10.11.0.0/24</text>
  <text class="ip-label-center" x="390" y="575">10.12.0.0/24</text>
  <text class="ip-label-center" x="670" y="575">10.13.0.0/24</text>
  <text class="ip-label-center" x="930" y="575">10.14.0.0/24</text>

  <!-- Spines -->
  <text class="node-label" x="270" y="42" text-anchor="middle">spine1</text>
  <text class="ip-label-center" x="270" y="56">lo 10.0.0.101/32</text>
  <circle class="node" cx="270" cy="72" r="18"/>
  <text class="router-label" x="270" y="72">R</text>
  <g transform="translate(233 112)">
    <rect class="tag" x="0" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="29" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="58" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="87" y="0" width="28" height="18" rx="8"/>
    <text class="tag-label" x="14" y="9">eth1</text>
    <text class="tag-label" x="43" y="9">eth2</text>
    <text class="tag-label" x="72" y="9">eth3</text>
    <text class="tag-label" x="101" y="9">eth4</text>
  </g>

  <text class="node-label" x="790" y="42" text-anchor="middle">spine2</text>
  <text class="ip-label-center" x="790" y="56">lo 10.0.0.102/32</text>
  <circle class="node" cx="790" cy="72" r="18"/>
  <text class="router-label" x="790" y="72">R</text>
  <g transform="translate(753 112)">
    <rect class="tag" x="0" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="29" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="58" y="0" width="28" height="18" rx="8"/>
    <rect class="tag" x="87" y="0" width="28" height="18" rx="8"/>
    <text class="tag-label" x="14" y="9">eth1</text>
    <text class="tag-label" x="43" y="9">eth2</text>
    <text class="tag-label" x="72" y="9">eth3</text>
    <text class="tag-label" x="101" y="9">eth4</text>
  </g>

  <!-- Leaves -->
  <g transform="translate(120 430)">
    <g transform="translate(-39 -60)">
      <rect class="tag" x="0" y="0" width="34" height="18" rx="8"/>
      <rect class="tag" x="40" y="0" width="34" height="18" rx="8"/>
      <text class="tag-label" x="17" y="9">eth1</text>
      <text class="tag-label" x="57" y="9">eth2</text>
    </g>
    <text class="node-label" x="-44" y="-4" text-anchor="end">leaf1</text>
    <text class="ip-label" x="-86" y="12">lo 10.0.0.11/32</text>
    <text class="ip-label" x="-86" y="26">gw 10.11.0.1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">R</text>
    <rect class="tag" x="-17" y="38" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="47">eth9</text>
  </g>

  <g transform="translate(390 430)">
    <g transform="translate(-39 -60)">
      <rect class="tag" x="0" y="0" width="34" height="18" rx="8"/>
      <rect class="tag" x="40" y="0" width="34" height="18" rx="8"/>
      <text class="tag-label" x="17" y="9">eth1</text>
      <text class="tag-label" x="57" y="9">eth2</text>
    </g>
    <text class="node-label" x="-44" y="-4" text-anchor="end">leaf2</text>
    <text class="ip-label" x="-86" y="12">lo 10.0.0.12/32</text>
    <text class="ip-label" x="-86" y="26">gw 10.12.0.1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">R</text>
    <rect class="tag" x="-17" y="38" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="47">eth9</text>
  </g>

  <g transform="translate(670 430)">
    <g transform="translate(-39 -60)">
      <rect class="tag" x="0" y="0" width="34" height="18" rx="8"/>
      <rect class="tag" x="40" y="0" width="34" height="18" rx="8"/>
      <text class="tag-label" x="17" y="9">eth1</text>
      <text class="tag-label" x="57" y="9">eth2</text>
    </g>
    <text class="node-label" x="44" y="-4">leaf3</text>
    <text class="ip-label" x="44" y="12">lo 10.0.0.13/32</text>
    <text class="ip-label" x="44" y="26">gw 10.13.0.1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">R</text>
    <rect class="tag" x="-17" y="38" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="47">eth9</text>
  </g>

  <g transform="translate(930 430)">
    <g transform="translate(-39 -60)">
      <rect class="tag" x="0" y="0" width="34" height="18" rx="8"/>
      <rect class="tag" x="40" y="0" width="34" height="18" rx="8"/>
      <text class="tag-label" x="17" y="9">eth1</text>
      <text class="tag-label" x="57" y="9">eth2</text>
    </g>
    <text class="node-label" x="44" y="-4">leaf4</text>
    <text class="ip-label" x="44" y="12">lo 10.0.0.14/32</text>
    <text class="ip-label" x="44" y="26">gw 10.14.0.1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">R</text>
    <rect class="tag" x="-17" y="38" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="47">eth9</text>
  </g>

  <!-- Hosts -->
  <g transform="translate(120 690)">
    <rect class="tag" x="-17" y="-45" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="-36">eth1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">H</text>
    <text class="node-label" x="0" y="35" text-anchor="middle">host1</text>
    <text class="ip-label-center" x="0" y="50">10.11.0.10/24</text>
  </g>
  <g transform="translate(390 690)">
    <rect class="tag" x="-17" y="-45" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="-36">eth1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">H</text>
    <text class="node-label" x="0" y="35" text-anchor="middle">host2</text>
    <text class="ip-label-center" x="0" y="50">10.12.0.10/24</text>
  </g>
  <g transform="translate(670 690)">
    <rect class="tag" x="-17" y="-45" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="-36">eth1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">H</text>
    <text class="node-label" x="0" y="35" text-anchor="middle">host3</text>
    <text class="ip-label-center" x="0" y="50">10.13.0.10/24</text>
  </g>
  <g transform="translate(930 690)">
    <rect class="tag" x="-17" y="-45" width="34" height="18" rx="8"/>
    <text class="tag-label" x="0" y="-36">eth1</text>
    <circle class="node" cx="0" cy="0" r="18"/>
    <text class="router-label" x="0" y="0">H</text>
    <text class="node-label" x="0" y="35" text-anchor="middle">host4</text>
    <text class="ip-label-center" x="0" y="50">10.14.0.10/24</text>
  </g>
</svg>
