all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    linux:
      hosts:
        clab-clos-ebgp-host1:
          ansible_host: 172.20.20.211
        clab-clos-ebgp-host2:
          ansible_host: 172.20.20.212
        clab-clos-ebgp-host3:
          ansible_host: 172.20.20.213
        clab-clos-ebgp-host4:
          ansible_host: 172.20.20.214
        clab-clos-ebgp-leaf1:
          ansible_host: 172.20.20.11
        clab-clos-ebgp-leaf2:
          ansible_host: 172.20.20.12
        clab-clos-ebgp-leaf3:
          ansible_host: 172.20.20.13
        clab-clos-ebgp-leaf4:
          ansible_host: 172.20.20.14
        clab-clos-ebgp-spine1:
          ansible_host: 172.20.20.101
        clab-clos-ebgp-spine2:
          ansible_host: 172.20.20.102
