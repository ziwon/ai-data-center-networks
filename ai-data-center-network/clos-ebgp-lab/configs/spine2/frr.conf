!
! spine2 (AS 65001)
!  eth1 -> leaf1   10.1.2.1/31
!  eth2 -> leaf2   10.2.2.1/31
!  eth3 -> leaf3   10.3.2.1/31
!  eth4 -> leaf4   10.4.2.1/31
!
frr defaults datacenter
hostname spine2
log stdout
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.102/32
!
interface eth1
 ip address 10.1.2.1/31
!
interface eth2
 ip address 10.2.2.1/31
!
interface eth3
 ip address 10.3.2.1/31
!
interface eth4
 ip address 10.4.2.1/31
!
router bgp 65001
 bgp router-id 10.0.0.102
 bgp log-neighbor-changes
 bgp bestpath as-path multipath-relax
 no bgp default ipv4-unicast
 timers bgp 3 9
 !
 neighbor LEAF peer-group
 neighbor LEAF advertisement-interval 0
 neighbor LEAF timers connect 5
 !
 neighbor 10.1.2.0 remote-as 65011
 neighbor 10.1.2.0 peer-group LEAF
 neighbor 10.2.2.0 remote-as 65012
 neighbor 10.2.2.0 peer-group LEAF
 neighbor 10.3.2.0 remote-as 65013
 neighbor 10.3.2.0 peer-group LEAF
 neighbor 10.4.2.0 remote-as 65014
 neighbor 10.4.2.0 peer-group LEAF
 !
 address-family ipv4 unicast
  redistribute connected route-map LOOPBACK-ONLY
  neighbor LEAF activate
  neighbor LEAF route-map ALLOW-ALL in
  neighbor LEAF route-map ALLOW-ALL out
  maximum-paths 64
 exit-address-family
!
ip prefix-list LOOPBACKS seq 10 permit 10.0.0.0/24 le 32
route-map LOOPBACK-ONLY permit 10
 match ip address prefix-list LOOPBACKS
!
route-map ALLOW-ALL permit 10
!
line vty
!
