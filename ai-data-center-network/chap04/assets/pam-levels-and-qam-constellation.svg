<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">PAM levels and QAM constellation comparison</title>
  <desc id="desc">PAM2, PAM4, and PAM8 are shown as one-dimensional amplitude levels. 16-QAM is shown as a two-dimensional I and Q constellation.</desc>
  <rect width="920" height="430" fill="#ffffff"/>
  <style>
    .title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
    .label { font: 600 15px Arial, sans-serif; fill: #0f172a; }
    .small { font: 13px Arial, sans-serif; fill: #334155; }
    .axis { stroke: #64748b; stroke-width: 2; }
    .level { stroke: #2563eb; stroke-width: 3; }
    .pamdot { fill: #2563eb; }
    .qamdot { fill: #ea580c; }
    .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
  </style>

  <text x="34" y="38" class="title">PAM increases bits per symbol by adding more amplitude levels</text>
  <text x="34" y="64" class="small">More levels improve bandwidth efficiency, but smaller spacing between levels requires better SNR, DSP, equalization, and FEC.</text>

  <g transform="translate(36,92)">
    <rect class="box" x="0" y="0" width="185" height="280"/>
    <text class="label" x="20" y="34">PAM2 / NRZ</text>
    <text class="small" x="20" y="56">2 levels, 1 bit/symbol</text>
    <line class="axis" x1="92" y1="82" x2="92" y2="230"/>
    <line class="level" x1="54" y1="210" x2="130" y2="210"/>
    <line class="level" x1="54" y1="102" x2="130" y2="102"/>
    <circle class="pamdot" cx="92" cy="210" r="6"/>
    <circle class="pamdot" cx="92" cy="102" r="6"/>
    <text class="small" x="140" y="215">0</text>
    <text class="small" x="140" y="107">1</text>
  </g>

  <g transform="translate(250,92)">
    <rect class="box" x="0" y="0" width="185" height="280"/>
    <text class="label" x="20" y="34">PAM4</text>
    <text class="small" x="20" y="56">4 levels, 2 bits/symbol</text>
    <line class="axis" x1="92" y1="82" x2="92" y2="230"/>
    <line class="level" x1="54" y1="220" x2="130" y2="220"/>
    <line class="level" x1="54" y1="176" x2="130" y2="176"/>
    <line class="level" x1="54" y1="132" x2="130" y2="132"/>
    <line class="level" x1="54" y1="88" x2="130" y2="88"/>
    <circle class="pamdot" cx="92" cy="220" r="5"/>
    <circle class="pamdot" cx="92" cy="176" r="5"/>
    <circle class="pamdot" cx="92" cy="132" r="5"/>
    <circle class="pamdot" cx="92" cy="88" r="5"/>
    <text class="small" x="140" y="225">00</text>
    <text class="small" x="140" y="181">01</text>
    <text class="small" x="140" y="137">10</text>
    <text class="small" x="140" y="93">11</text>
  </g>

  <g transform="translate(464,92)">
    <rect class="box" x="0" y="0" width="185" height="280"/>
    <text class="label" x="20" y="34">PAM8</text>
    <text class="small" x="20" y="56">8 levels, 3 bits/symbol</text>
    <line class="axis" x1="92" y1="82" x2="92" y2="230"/>
    <g>
      <line class="level" x1="54" y1="226" x2="130" y2="226"/><circle class="pamdot" cx="92" cy="226" r="4"/>
      <line class="level" x1="54" y1="206" x2="130" y2="206"/><circle class="pamdot" cx="92" cy="206" r="4"/>
      <line class="level" x1="54" y1="186" x2="130" y2="186"/><circle class="pamdot" cx="92" cy="186" r="4"/>
      <line class="level" x1="54" y1="166" x2="130" y2="166"/><circle class="pamdot" cx="92" cy="166" r="4"/>
      <line class="level" x1="54" y1="146" x2="130" y2="146"/><circle class="pamdot" cx="92" cy="146" r="4"/>
      <line class="level" x1="54" y1="126" x2="130" y2="126"/><circle class="pamdot" cx="92" cy="126" r="4"/>
      <line class="level" x1="54" y1="106" x2="130" y2="106"/><circle class="pamdot" cx="92" cy="106" r="4"/>
      <line class="level" x1="54" y1="86" x2="130" y2="86"/><circle class="pamdot" cx="92" cy="86" r="4"/>
    </g>
    <text class="small" x="32" y="254">More levels, smaller margins</text>
  </g>

  <g transform="translate(700,92)">
    <rect class="box" x="0" y="0" width="185" height="280"/>
    <text class="label" x="20" y="34">16-QAM</text>
    <text class="small" x="20" y="56">I/Q amplitudes, 4 bits/symbol</text>
    <line class="axis" x1="36" y1="156" x2="154" y2="156"/>
    <line class="axis" x1="95" y1="88" x2="95" y2="224"/>
    <text class="small" x="158" y="160">I</text>
    <text class="small" x="100" y="84">Q</text>
    <g>
      <line class="grid" x1="56" y1="96" x2="56" y2="216"/><line class="grid" x1="82" y1="96" x2="82" y2="216"/><line class="grid" x1="108" y1="96" x2="108" y2="216"/><line class="grid" x1="134" y1="96" x2="134" y2="216"/>
      <line class="grid" x1="48" y1="112" x2="142" y2="112"/><line class="grid" x1="48" y1="142" x2="142" y2="142"/><line class="grid" x1="48" y1="170" x2="142" y2="170"/><line class="grid" x1="48" y1="200" x2="142" y2="200"/>
      <circle class="qamdot" cx="56" cy="112" r="5"/><circle class="qamdot" cx="82" cy="112" r="5"/><circle class="qamdot" cx="108" cy="112" r="5"/><circle class="qamdot" cx="134" cy="112" r="5"/>
      <circle class="qamdot" cx="56" cy="142" r="5"/><circle class="qamdot" cx="82" cy="142" r="5"/><circle class="qamdot" cx="108" cy="142" r="5"/><circle class="qamdot" cx="134" cy="142" r="5"/>
      <circle class="qamdot" cx="56" cy="170" r="5"/><circle class="qamdot" cx="82" cy="170" r="5"/><circle class="qamdot" cx="108" cy="170" r="5"/><circle class="qamdot" cx="134" cy="170" r="5"/>
      <circle class="qamdot" cx="56" cy="200" r="5"/><circle class="qamdot" cx="82" cy="200" r="5"/><circle class="qamdot" cx="108" cy="200" r="5"/><circle class="qamdot" cx="134" cy="200" r="5"/>
    </g>
    <text class="small" x="18" y="254">Two-dimensional constellation</text>
  </g>
</svg>
