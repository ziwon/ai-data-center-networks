<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Mixed precision training flow</title>
  <desc id="desc">Mixed precision training keeps stable master weights in FP32 while using FP16 or BF16 tensors for forward and backward computation, then applies updates back to the master weights.</desc>
  <style>
    .bg { fill: #F5F1EA; }
    .box { fill: none; stroke: #111111; stroke-width: 1.4; rx: 6; }
    .soft { fill: #F3EFE7; stroke: #D8D1C7; stroke-width: 1.2; rx: 6; }
    .accent { fill: none; stroke: #D9392E; stroke-width: 2.2; rx: 6; }
    .line { fill: none; stroke: #111111; stroke-width: 1.3; marker-end: url(#arrow); }
    .hot { fill: none; stroke: #D9392E; stroke-width: 1.8; marker-end: url(#arrowRed); }
    .muted { fill: none; stroke: #6F6A63; stroke-width: 1.1; stroke-dasharray: 4 4; marker-end: url(#arrowSoft); }
    .text { fill: #050505; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
    .small { fill: #6F6A63; font-family: Arial, sans-serif; font-size: 13px; }
    .mono { fill: #050505; font-family: "Courier New", monospace; font-size: 13px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D9392E"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6F6A63"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="430"/>

  <rect class="box" x="70" y="70" width="170" height="84"/>
  <text class="text" x="155" y="103" text-anchor="middle">FP32 master</text>
  <text class="small" x="155" y="126" text-anchor="middle">stable weight copy</text>
  <text class="mono" x="155" y="146" text-anchor="middle">W_master</text>

  <rect class="soft" x="330" y="70" width="170" height="84"/>
  <text class="text" x="415" y="103" text-anchor="middle">Cast weights</text>
  <text class="small" x="415" y="126" text-anchor="middle">FP16 or BF16</text>
  <text class="mono" x="415" y="146" text-anchor="middle">W_compute</text>

  <rect class="soft" x="590" y="70" width="170" height="84"/>
  <text class="text" x="675" y="103" text-anchor="middle">Forward pass</text>
  <text class="small" x="675" y="126" text-anchor="middle">low precision activations</text>
  <text class="mono" x="675" y="146" text-anchor="middle">loss</text>

  <rect class="soft" x="590" y="250" width="170" height="84"/>
  <text class="text" x="675" y="283" text-anchor="middle">Backward pass</text>
  <text class="small" x="675" y="306" text-anchor="middle">low precision gradients</text>
  <text class="mono" x="675" y="326" text-anchor="middle">grad</text>

  <rect class="accent" x="330" y="250" width="170" height="84"/>
  <text class="text" x="415" y="283" text-anchor="middle">Optimizer step</text>
  <text class="small" x="415" y="306" text-anchor="middle">update FP32 master</text>
  <text class="mono" x="415" y="326" text-anchor="middle">Adam states</text>

  <rect class="box" x="70" y="250" width="170" height="84"/>
  <text class="text" x="155" y="283" text-anchor="middle">Next master</text>
  <text class="small" x="155" y="306" text-anchor="middle">accumulated in FP32</text>
  <text class="mono" x="155" y="326" text-anchor="middle">W_master'</text>

  <path class="line" d="M240 112 L330 112"/>
  <path class="line" d="M500 112 L590 112"/>
  <path class="line" d="M675 154 L675 250"/>
  <path class="hot" d="M590 292 L500 292"/>
  <path class="hot" d="M330 292 L240 292"/>
  <path class="muted" d="M155 250 C155 205 155 199 155 154"/>

  <text class="small" x="480" y="389" text-anchor="middle">The compute path is cheaper, while the long-lived weight state stays numerically stable.</text>
</svg>
