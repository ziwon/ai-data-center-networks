<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Transformer encoder decoder architecture</title>
  <desc id="desc">Source tokens pass through embedding, positional encoding, and an encoder stack. Target tokens pass through masked self-attention, cross-attention over encoder outputs, feed-forward layers, and softmax decoding.</desc>
  <style>
    .bg { fill: #F5F1EA; }
    .box { fill: none; stroke: #111111; stroke-width: 1.4; rx: 6; }
    .soft { fill: #F3EFE7; stroke: #D8D1C7; stroke-width: 1.2; rx: 6; }
    .critical { fill: none; stroke: #D9392E; stroke-width: 2.2; rx: 6; }
    .line { fill: none; stroke: #111111; stroke-width: 1.4; marker-end: url(#arrow); }
    .softLine { fill: none; stroke: #6F6A63; stroke-width: 1.2; marker-end: url(#arrowSoft); }
    .text { fill: #050505; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; }
    .small { fill: #6F6A63; font-family: Arial, sans-serif; font-size: 12px; }
    .label { fill: #050505; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6F6A63"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="500"/>

  <rect class="soft" x="50" y="70" width="170" height="56"/>
  <text class="text" x="135" y="99" text-anchor="middle">Source tokens</text>
  <text class="small" x="135" y="119" text-anchor="middle">input sentence</text>

  <rect class="box" x="50" y="160" width="170" height="62"/>
  <text class="text" x="135" y="188" text-anchor="middle">Embedding</text>
  <text class="small" x="135" y="210" text-anchor="middle">token + position</text>

  <rect class="box" x="285" y="110" width="190" height="190"/>
  <text class="label" x="380" y="139" text-anchor="middle">Encoder stack x N</text>
  <rect class="soft" x="315" y="160" width="130" height="44"/>
  <text class="small" x="380" y="187" text-anchor="middle">self-attention</text>
  <rect class="soft" x="315" y="226" width="130" height="44"/>
  <text class="small" x="380" y="253" text-anchor="middle">feed-forward</text>

  <rect class="box" x="535" y="110" width="170" height="190"/>
  <text class="label" x="620" y="139" text-anchor="middle">Encoded memory</text>
  <text class="small" x="620" y="174" text-anchor="middle">context-aware</text>
  <text class="small" x="620" y="195" text-anchor="middle">source vectors</text>
  <text class="small" x="620" y="231" text-anchor="middle">used as K and V</text>

  <path class="line" d="M135 126 L135 160"/>
  <path class="line" d="M220 191 L285 191"/>
  <path class="line" d="M475 205 L535 205"/>

  <rect class="soft" x="50" y="365" width="170" height="56"/>
  <text class="text" x="135" y="394" text-anchor="middle">Target tokens</text>
  <text class="small" x="135" y="414" text-anchor="middle">BOS + previous outputs</text>

  <rect class="box" x="285" y="340" width="190" height="105"/>
  <text class="label" x="380" y="369" text-anchor="middle">Masked self-attn</text>
  <text class="small" x="380" y="395" text-anchor="middle">causal target context</text>
  <text class="small" x="380" y="417" text-anchor="middle">future tokens blocked</text>

  <rect class="critical" x="535" y="340" width="170" height="105"/>
  <text class="label" x="620" y="369" text-anchor="middle">Cross-attention</text>
  <text class="small" x="620" y="395" text-anchor="middle">Q from decoder</text>
  <text class="small" x="620" y="417" text-anchor="middle">K,V from encoder</text>

  <rect class="box" x="765" y="340" width="155" height="105"/>
  <text class="label" x="842.5" y="369" text-anchor="middle">FFN + softmax</text>
  <text class="small" x="842.5" y="395" text-anchor="middle">next token</text>
  <text class="small" x="842.5" y="417" text-anchor="middle">probability</text>

  <path class="line" d="M220 393 L285 393"/>
  <path class="line" d="M475 393 L535 393"/>
  <path class="line" d="M705 393 L765 393"/>
  <path class="softLine" d="M620 300 L620 340"/>
  <path class="softLine" d="M842 445 C842 470 135 470 135 421"/>
  <text class="small" x="485" y="483" text-anchor="middle">generated token is fed back until EOS</text>
</svg>
