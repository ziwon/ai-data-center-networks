<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">GRPO group-relative advantage</title>
  <desc id="desc">A diagram showing one prompt sampled into multiple completions, each scored by a verifier, then normalized into group-relative advantages for policy update.</desc>
  <style>
    .bg { fill: #F5F1EA; }
    .box { fill: none; stroke: #111111; stroke-width: 1.6; rx: 8; }
    .soft { fill: #F3EFE7; stroke: #D8D1C7; stroke-width: 1.3; rx: 8; }
    .accent { fill: #F5F1EA; stroke: #D9392E; stroke-width: 2.2; rx: 8; }
    .text { fill: #050505; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
    .small { fill: #6F6A63; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
    .tiny { fill: #6F6A63; font-family: Arial, Helvetica, sans-serif; font-size: 13px; }
    .line { fill: none; stroke: #111111; stroke-width: 1.5; marker-end: url(#arrow); }
    .redline { fill: none; stroke: #D9392E; stroke-width: 2; marker-end: url(#arrowRed); }
    .dash { fill: none; stroke: #6F6A63; stroke-width: 1.3; stroke-dasharray: 6 6; marker-end: url(#arrowGray); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111111"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D9392E"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6F6A63"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="540"/>

  <rect class="box" x="54" y="218" width="166" height="78"/>
  <text class="text" x="92" y="254">Prompt</text>
  <text class="small" x="92" y="278">same query x</text>

  <rect class="soft" x="310" y="70" width="202" height="70"/>
  <text class="text" x="348" y="108">Completion 1</text>
  <text class="tiny" x="348" y="128">reward r1</text>
  <rect class="soft" x="310" y="186" width="202" height="70"/>
  <text class="text" x="348" y="224">Completion 2</text>
  <text class="tiny" x="348" y="244">reward r2</text>
  <rect class="soft" x="310" y="302" width="202" height="70"/>
  <text class="text" x="348" y="340">Completion G</text>
  <text class="tiny" x="348" y="360">reward rG</text>

  <rect class="accent" x="600" y="186" width="210" height="92"/>
  <text class="text" x="642" y="226">Group stats</text>
  <text class="small" x="642" y="252">mean and std of rewards</text>

  <rect class="box" x="890" y="104" width="176" height="78"/>
  <text class="text" x="928" y="140">Advantage</text>
  <text class="small" x="928" y="164">Ai = (ri - mean) / std</text>
  <rect class="box" x="890" y="326" width="176" height="78"/>
  <text class="text" x="936" y="362">Update</text>
  <text class="small" x="936" y="386">policy + KL control</text>

  <path class="line" d="M220 257 C250 257 270 105 288 105"/>
  <path class="line" d="M220 257 H288"/>
  <path class="line" d="M220 257 C250 257 270 337 288 337"/>
  <path class="line" d="M512 105 C548 105 560 210 578 220"/>
  <path class="line" d="M512 221 H578"/>
  <path class="line" d="M512 337 C548 337 560 254 578 244"/>
  <path class="redline" d="M810 232 C842 232 846 146 868 144"/>
  <path class="line" d="M978 182 V304"/>
  <path class="dash" d="M890 365 C820 365 812 300 810 278"/>

  <text class="small" x="54" y="470">GRPO replaces a separately trained value function with a within-prompt reward baseline.</text>
  <text class="tiny" x="54" y="494">The same prompt must be sampled multiple times so each completion can be judged relative to its group.</text>
</svg>
