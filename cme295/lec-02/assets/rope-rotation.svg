<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">RoPE rotates query and key by position</title>
  <desc id="desc">Rotary position embedding rotates query and key vectors by angles tied to their positions, so the attention dot product depends on relative distance.</desc>
  <style>
    .bg { fill: #F5F1EA; }
    .box { fill: none; stroke: #111111; stroke-width: 1.4; rx: 6; }
    .soft { fill: #F3EFE7; stroke: #D8D1C7; stroke-width: 1.2; rx: 6; }
    .accent { fill: none; stroke: #D9392E; stroke-width: 2.2; marker-end: url(#arrowRed); }
    .line { fill: none; stroke: #111111; stroke-width: 1.4; marker-end: url(#arrow); }
    .axis { fill: none; stroke: #D8D1C7; stroke-width: 1.1; }
    .vec { fill: none; stroke: #111111; stroke-width: 2; marker-end: url(#arrow); }
    .vec2 { fill: none; stroke: #D9392E; stroke-width: 2.2; marker-end: url(#arrowRed); }
    .text { fill: #050505; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
    .small { fill: #6F6A63; font-family: Arial, sans-serif; font-size: 13px; }
    .mono { fill: #050505; font-family: "Courier New", monospace; font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D9392E"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="430"/>

  <rect class="box" x="40" y="65" width="190" height="105"/>
  <text class="text" x="135" y="102" text-anchor="middle">Token at pos m</text>
  <text class="small" x="135" y="128" text-anchor="middle">query vector</text>
  <text class="mono" x="135" y="150" text-anchor="middle">q_m</text>

  <rect class="box" x="40" y="260" width="190" height="105"/>
  <text class="text" x="135" y="297" text-anchor="middle">Token at pos n</text>
  <text class="small" x="135" y="323" text-anchor="middle">key vector</text>
  <text class="mono" x="135" y="345" text-anchor="middle">k_n</text>

  <rect class="soft" x="300" y="65" width="190" height="105"/>
  <text class="text" x="395" y="102" text-anchor="middle">Rotate by m</text>
  <text class="small" x="395" y="128" text-anchor="middle">position-dependent angle</text>
  <text class="mono" x="395" y="150" text-anchor="middle">R_m q_m</text>

  <rect class="soft" x="300" y="260" width="190" height="105"/>
  <text class="text" x="395" y="297" text-anchor="middle">Rotate by n</text>
  <text class="small" x="395" y="323" text-anchor="middle">position-dependent angle</text>
  <text class="mono" x="395" y="345" text-anchor="middle">R_n k_n</text>

  <path class="line" d="M230 118 L300 118"/>
  <path class="line" d="M230 313 L300 313"/>

  <rect class="box" x="570" y="135" width="290" height="160"/>
  <text class="text" x="715" y="169" text-anchor="middle">Attention score</text>
  <text class="mono" x="715" y="204" text-anchor="middle">(R_m q_m) dot (R_n k_n)</text>
  <path class="accent" d="M630 230 L800 230"/>
  <text class="small" x="715" y="257" text-anchor="middle">depends on relative distance</text>
  <text class="mono" x="715" y="281" text-anchor="middle">n - m</text>

  <path class="line" d="M490 118 C530 118 535 185 570 190"/>
  <path class="line" d="M490 313 C530 313 535 245 570 240"/>

  <g transform="translate(725 80)">
    <line class="axis" x1="-45" y1="0" x2="45" y2="0"/>
    <line class="axis" x1="0" y1="45" x2="0" y2="-45"/>
    <path class="vec" d="M0 0 L30 -18"/>
    <path class="vec2" d="M0 0 L12 -36"/>
    <path class="accent" d="M33 -16 A36 36 0 0 0 14 -37"/>
    <text class="small" x="-45" y="63">rotation in 2D block</text>
  </g>
</svg>
