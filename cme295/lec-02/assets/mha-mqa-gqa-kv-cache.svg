<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">MHA MQA GQA key value sharing</title>
  <desc id="desc">Multi-head attention uses separate key value heads, multi-query attention shares one key value head, and grouped-query attention shares key value heads by group.</desc>
  <style>
    .bg { fill: #F5F1EA; }
    .panel { fill: none; stroke: #111111; stroke-width: 1.3; rx: 6; }
    .q { fill: #F3EFE7; stroke: #111111; stroke-width: 1.1; rx: 4; }
    .kv { fill: none; stroke: #D9392E; stroke-width: 1.8; rx: 4; }
    .soft { fill: #F3EFE7; stroke: #D8D1C7; stroke-width: 1.1; rx: 4; }
    .text { fill: #050505; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; }
    .small { fill: #6F6A63; font-family: Arial, sans-serif; font-size: 12px; }
    .mono { fill: #050505; font-family: "Courier New", monospace; font-size: 13px; }
  </style>
  <rect class="bg" width="960" height="430"/>

  <rect class="panel" x="35" y="55" width="280" height="315"/>
  <text class="text" x="175" y="90" text-anchor="middle">MHA</text>
  <text class="small" x="175" y="112" text-anchor="middle">every query head has its own K,V</text>
  <g transform="translate(70 145)">
    <rect class="q" x="0" y="0" width="55" height="38"/><text class="mono" x="27.5" y="24" text-anchor="middle">Q1</text>
    <rect class="kv" x="80" y="0" width="55" height="38"/><text class="mono" x="107.5" y="24" text-anchor="middle">KV1</text>
    <rect class="q" x="0" y="55" width="55" height="38"/><text class="mono" x="27.5" y="79" text-anchor="middle">Q2</text>
    <rect class="kv" x="80" y="55" width="55" height="38"/><text class="mono" x="107.5" y="79" text-anchor="middle">KV2</text>
    <rect class="q" x="0" y="110" width="55" height="38"/><text class="mono" x="27.5" y="134" text-anchor="middle">Q3</text>
    <rect class="kv" x="80" y="110" width="55" height="38"/><text class="mono" x="107.5" y="134" text-anchor="middle">KV3</text>
    <rect class="q" x="0" y="165" width="55" height="38"/><text class="mono" x="27.5" y="189" text-anchor="middle">Q4</text>
    <rect class="kv" x="80" y="165" width="55" height="38"/><text class="mono" x="107.5" y="189" text-anchor="middle">KV4</text>
  </g>
  <text class="small" x="175" y="340" text-anchor="middle">KV cache: high</text>

  <rect class="panel" x="340" y="55" width="280" height="315"/>
  <text class="text" x="480" y="90" text-anchor="middle">MQA</text>
  <text class="small" x="480" y="112" text-anchor="middle">all query heads share one K,V</text>
  <g transform="translate(380 145)">
    <rect class="q" x="0" y="0" width="55" height="38"/><text class="mono" x="27.5" y="24" text-anchor="middle">Q1</text>
    <rect class="q" x="0" y="55" width="55" height="38"/><text class="mono" x="27.5" y="79" text-anchor="middle">Q2</text>
    <rect class="q" x="0" y="110" width="55" height="38"/><text class="mono" x="27.5" y="134" text-anchor="middle">Q3</text>
    <rect class="q" x="0" y="165" width="55" height="38"/><text class="mono" x="27.5" y="189" text-anchor="middle">Q4</text>
    <rect class="kv" x="110" y="78" width="75" height="52"/><text class="mono" x="147.5" y="109" text-anchor="middle">KV</text>
  </g>
  <text class="small" x="480" y="340" text-anchor="middle">KV cache: low</text>

  <rect class="panel" x="645" y="55" width="280" height="315"/>
  <text class="text" x="785" y="90" text-anchor="middle">GQA</text>
  <text class="small" x="785" y="112" text-anchor="middle">query heads share K,V by group</text>
  <g transform="translate(685 145)">
    <rect class="q" x="0" y="0" width="55" height="38"/><text class="mono" x="27.5" y="24" text-anchor="middle">Q1</text>
    <rect class="q" x="0" y="55" width="55" height="38"/><text class="mono" x="27.5" y="79" text-anchor="middle">Q2</text>
    <rect class="kv" x="110" y="28" width="75" height="52"/><text class="mono" x="147.5" y="59" text-anchor="middle">KV A</text>
    <rect class="q" x="0" y="120" width="55" height="38"/><text class="mono" x="27.5" y="144" text-anchor="middle">Q3</text>
    <rect class="q" x="0" y="175" width="55" height="38"/><text class="mono" x="27.5" y="199" text-anchor="middle">Q4</text>
    <rect class="kv" x="110" y="148" width="75" height="52"/><text class="mono" x="147.5" y="179" text-anchor="middle">KV B</text>
  </g>
  <text class="small" x="785" y="340" text-anchor="middle">KV cache: medium</text>
</svg>
