  <rect x="218" y="960" width="670" height="54" rx="7" class="boxGold"/>
  <text x="553" y="984" text-anchor="middle" class="title" font-size="16">sriov-device-plugin DaemonSet</text>
  <text x="553" y="1006" text-anchor="middle" class="small">(Discover PF/VF, Report nvidia.com/rdma_shared_dev_400g to API Server)</text>
