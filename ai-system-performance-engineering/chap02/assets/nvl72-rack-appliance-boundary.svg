<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">NVL72 rack appliance boundary</title>
  <desc id="desc">A flow-oriented diagram showing what is preintegrated inside an NVL72 rack and what must be connected outside the rack.</desc>
  <style>
    svg {
      background: #F5F1EA;
      color: #050505;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      fill: none;
      stroke: #111111;
      stroke-width: 1.6;
    }
    .soft {
      fill: none;
      stroke: #D8D1C7;
      stroke-width: 1.4;
    }
    .dash {
      fill: none;
      stroke: #6F6A63;
      stroke-width: 1.3;
      stroke-dasharray: 7 7;
    }
    .accent {
      fill: none;
      stroke: #D9392E;
      stroke-width: 2.2;
    }
    .arrow {
      fill: none;
      stroke: #111111;
      stroke-width: 1.5;
      marker-end: url(#arrow);
    }
    .arrow-soft {
      fill: none;
      stroke: #6F6A63;
      stroke-width: 1.3;
      marker-end: url(#arrow-soft);
    }
    .arrow-accent {
      fill: none;
      stroke: #D9392E;
      stroke-width: 2.2;
      marker-end: url(#arrow-accent);
    }
    .label {
      fill: #050505;
      font-size: 20px;
      font-weight: 700;
    }
    .text {
      fill: #050505;
      font-size: 16px;
      font-weight: 600;
    }
    .small {
      fill: #6F6A63;
      font-size: 13px;
    }
    .num {
      fill: #050505;
      font-size: 26px;
      font-weight: 800;
    }
    .warn {
      fill: #D9392E;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111111"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6F6A63"/>
    </marker>
    <marker id="arrow-accent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D9392E"/>
    </marker>
  </defs>

  <rect x="34" y="34" width="650" height="552" rx="0" class="box"/>
  <text x="62" y="78" class="label">Preintegrated NVL72 rack</text>
  <text x="62" y="104" class="small">Internal topology is a validated appliance boundary</text>

  <rect x="72" y="140" width="250" height="124" class="soft"/>
  <text x="94" y="176" class="num">18</text>
  <text x="136" y="174" class="text">compute trays</text>
  <text x="94" y="202" class="small">4 Blackwell GPUs</text>
  <text x="94" y="224" class="small">2 Grace CPUs per tray</text>

  <rect x="394" y="140" width="250" height="124" class="soft"/>
  <text x="416" y="176" class="num">9</text>
  <text x="454" y="174" class="text">NVSwitch trays</text>
  <text x="416" y="202" class="small">18 NVSwitch ASICs</text>
  <text x="416" y="224" class="small">one-hop GPU fabric</text>

  <rect x="72" y="324" width="250" height="116" class="soft"/>
  <text x="94" y="360" class="text">Power distribution</text>
  <text x="94" y="386" class="small">redundant feeds</text>
  <text x="94" y="408" class="small">PDU and transient control</text>

  <rect x="394" y="324" width="250" height="116" class="soft"/>
  <text x="416" y="360" class="text">Liquid cooling</text>
  <text x="416" y="386" class="small">cold plates, manifolds</text>
  <text x="416" y="408" class="small">CDU or facility loop</text>

  <rect x="190" y="478" width="336" height="66" class="dash"/>
  <text x="218" y="508" class="text">Base Command / SLURM / Kubernetes</text>
  <text x="218" y="530" class="small">management, scheduling, telemetry hooks</text>

  <path d="M322 202 H394" class="arrow"/>
  <path d="M197 264 V324" class="arrow-soft"/>
  <path d="M519 264 V324" class="arrow-soft"/>
  <path d="M322 382 H394" class="arrow-soft"/>
  <path d="M358 440 V478" class="arrow-soft"/>

  <rect x="760" y="88" width="282" height="110" class="soft"/>
  <text x="790" y="126" class="text">Facility power</text>
  <text x="790" y="152" class="small">high-capacity feeds</text>
  <text x="790" y="174" class="small">capacity and redundancy</text>

  <rect x="760" y="244" width="282" height="110" class="soft"/>
  <text x="790" y="282" class="text">Chilled water loop</text>
  <text x="790" y="308" class="small">temperature, pressure</text>
  <text x="790" y="330" class="small">leak detection</text>

  <rect x="760" y="400" width="282" height="110" class="soft"/>
  <text x="790" y="438" class="text">External fabric</text>
  <text x="790" y="464" class="small">InfiniBand / Ethernet</text>
  <text x="790" y="486" class="small">storage, other racks</text>

  <path d="M760 142 H684" class="arrow-accent"/>
  <path d="M760 298 H684" class="arrow-accent"/>
  <path d="M684 455 H760" class="arrow-accent"/>

  <text x="706" y="130" class="warn">site</text>
  <text x="706" y="286" class="warn">site</text>
  <text x="696" y="444" class="warn">scale-out</text>
</svg>
